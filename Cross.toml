# Cross.toml – configuration for the `cross` cross-compilation tool.
#
# The eBPF BPF C program (bpf/tinytun.bpf.c) is compiled at build time using
# `clang -target bpf` and embedded in the binary.  The cross Docker images do
# not ship clang, so we install it as a pre-build step.
#
# Note: the BPF object is compiled for the *BPF VM* (architecture-neutral),
# not for the target CPU, so a single host-side clang installation suffices
# for all cross-compilation targets.

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "apt-get update && apt-get install -y --no-install-recommends clang",
]

[target.armv7-unknown-linux-musleabihf]
pre-build = [
    "apt-get update && apt-get install -y --no-install-recommends clang",
]
