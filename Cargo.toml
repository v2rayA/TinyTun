[package]
name = "tinytun"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "A Rust-based tun2socks implementation with SOCKS5 support and DNS handling"
license = "GPL-3.0-or-later"

[dependencies]
# TUN device management
tun = { version = "0.8.0", features = ["async"] }
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"

# Networking and protocol support
socket2 = "0.5"
ipnet = "2.1"
ipnetwork = "0.20"
route_manager = "0.2.11"
bytes = "1.0"
anyhow = "1.0"
log = "0.4"
env_logger = "0.10"
etherparse = "0.14"
netstat2 = "0.11.2"

# SOCKS5 implementation
socks5-impl = "0.1.0"

# DNS handling
trust-dns-client = "0.23"
trust-dns-resolver = "0.23"

# Configuration and utilities
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.0", features = ["derive"] }
thiserror = "1.0"
libc = "0.2"

[target.'cfg(target_os = "linux")'.dependencies]
# eBPF user-space library for loading and managing BPF programs/maps.
aya = "0.13"

[target.'cfg(windows)'.dependencies]
ipconfig = "0.3"
windows = { version = "0.61", features = [
	"Win32_Foundation",
	"Win32_System_Com",
	"Win32_NetworkManagement_WindowsFirewall",
] }

[dev-dependencies]
tokio-test = "0.4"
