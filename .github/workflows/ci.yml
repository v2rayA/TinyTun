name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  BIN_NAME: tinytun

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            build_tool: cargo-msvc
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            build_tool: cargo-msvc
          - target: x86_64-pc-windows-gnu
            runner: windows-latest
            build_tool: cargo-windows-gnu
          - target: x86_64-pc-windows-gnullvm
            runner: windows-latest
            build_tool: cargo-gnullvm
          - target: aarch64-pc-windows-gnullvm
            runner: windows-11-arm
            build_tool: cargo-gnullvm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            build_tool: cargo
            ebpf: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            build_tool: cargo
            ebpf: true
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-24.04
            build_tool: cross

          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            build_tool: cargo-musl
            ebpf: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            build_tool: cargo-musl
            ebpf: true
          - target: armv7-unknown-linux-musleabihf
            runner: ubuntu-24.04
            build_tool: cross

          - target: x86_64-apple-darwin
            runner: macos-26-intel
            build_tool: cargo
          - target: aarch64-apple-darwin
            runner: macos-latest
            build_tool: cargo

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        if: matrix.target != 'x86_64-pc-windows-gnullvm' && matrix.target != 'aarch64-pc-windows-gnullvm'
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust nightly toolchain (eBPF builds)
        if: matrix.ebpf == true
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker (eBPF builds)
        if: matrix.ebpf == true
        run: cargo install bpf-linker --locked

      - name: Install cross
        if: matrix.build_tool == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install MSYS2 (MinGW64)
        if: matrix.build_tool == 'cargo-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install MSYS2 toolchain (gnullvm x86_64)
        if: matrix.build_tool == 'cargo-gnullvm' && matrix.target == 'x86_64-pc-windows-gnullvm'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-lld
            mingw-w64-clang-x86_64-llvm
            mingw-w64-clang-x86_64-rust

      - name: Install MSYS2 toolchain (gnullvm aarch64)
        if: matrix.build_tool == 'cargo-gnullvm' && matrix.target == 'aarch64-pc-windows-gnullvm'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-lld
            mingw-w64-clang-aarch64-llvm
            mingw-w64-clang-aarch64-rust 

      - name: Install musl toolchain
        if: matrix.build_tool == 'cargo-musl'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (cargo)
        if: matrix.build_tool == 'cargo' && matrix.ebpf != true
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cargo, with eBPF inbound)
        if: matrix.build_tool == 'cargo' && matrix.ebpf == true
        run: cargo build --locked --release --target ${{ matrix.target }} --features ebpf-inbound

      - name: Build (cargo, windows msvc static CRT)
        if: matrix.build_tool == 'cargo-msvc'
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cargo, windows gnu via MSYS2)
        if: matrix.build_tool == 'cargo-windows-gnu'
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cargo, windows gnullvm via Cargo target config)
        if: matrix.build_tool == 'cargo-gnullvm'
        shell: msys2 {0}
        run: |
          cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cargo, musl)
        if: matrix.build_tool == 'cargo-musl' && matrix.ebpf != true
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (cargo, musl, with eBPF inbound)
        if: matrix.build_tool == 'cargo-musl' && matrix.ebpf == true
        run: cargo build --locked --release --target ${{ matrix.target }} --features ebpf-inbound

      - name: Build (cross)
        if: matrix.build_tool == 'cross'
        run: cross build --locked --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/${{ matrix.target }}"
          mkdir -p "$out_dir"

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            artifact_bin="${BIN_NAME}-${{ matrix.target }}.exe"
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "$out_dir/$artifact_bin"
          else
            artifact_bin="${BIN_NAME}-${{ matrix.target }}"
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$out_dir/$artifact_bin"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinytun-${{ matrix.target }}
          path: dist/${{ matrix.target }}/
          if-no-files-found: error
          compression-level: 0

  release:
    name: release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download Wintun binaries
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip -q wintun.zip -d wintun

      - name: Build release zips and checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          mkdir -p release

          for artifact_dir in artifacts/tinytun-*; do
            target="${artifact_dir#artifacts/tinytun-}"
            package_dir="pkg/tinytun-${tag}-${target}"
            mkdir -p "$package_dir"

            if [[ "$target" == *"windows"* ]]; then
              artifact_bin="${BIN_NAME}-${target}.exe"
              cp "$artifact_dir/$artifact_bin" "$package_dir/$artifact_bin"

              if [[ "$target" == x86_64-* ]]; then
                cp wintun/wintun/bin/amd64/wintun.dll "$package_dir/wintun.dll"
              elif [[ "$target" == aarch64-* ]]; then
                cp wintun/wintun/bin/arm64/wintun.dll "$package_dir/wintun.dll"
              fi
            else
              artifact_bin="${BIN_NAME}-${target}"
              cp "$artifact_dir/$artifact_bin" "$package_dir/$artifact_bin"
            fi

            (
              cd "$package_dir"
              zip -q -r "../../release/$(basename "$package_dir").zip" .
            )
          done

          (
            cd release
            sha256sum *.zip > hash.txt
          )

      - name: Upload release bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundles-${{ github.ref_name }}
          path: release/
          if-no-files-found: error
          compression-level: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/hash.txt
          generate_release_notes: true
          draft: false
          prerelease: false
