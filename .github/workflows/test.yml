name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: x64,   runner: ubuntu-24.04,    target: x86_64-unknown-linux-gnu  }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos,   arch: x64,   runner: macos-26-intel,  target: x86_64-apple-darwin       }
          - { os: macos,   arch: arm64, runner: macos-latest,    target: aarch64-apple-darwin      }
          - { os: windows, arch: x64,   runner: windows-latest,  target: x86_64-pc-windows-msvc   }
          - { os: windows, arch: arm64, runner: windows-11-arm,  target: aarch64-pc-windows-msvc  }

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (Unix)
        if: matrix.os != 'windows'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (Windows)
        if: matrix.os == 'windows'
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Install v2ray (Linux/macOS via Homebrew)
        if: matrix.os != 'windows'
        run: |
          if command -v /usr/local/bin/brew > /dev/null; then
              brew_path="/usr/local/bin/brew"
              brew_prefix="$(/usr/local/bin/brew --prefix)"
              eval "$(/usr/local/bin/brew shellenv)"
          elif command -v /opt/homebrew/bin/brew > /dev/null; then
              brew_path="/opt/homebrew/bin/brew"
              brew_prefix="$(/opt/homebrew/bin/brew --prefix)"
              eval "$(/opt/homebrew/bin/brew shellenv)"
          elif command -v /home/linuxbrew/.linuxbrew/bin/brew > /dev/null; then
              brew_path="/home/linuxbrew/.linuxbrew/bin/brew"
              brew_prefix="$(/home/linuxbrew/.linuxbrew/bin/brew --prefix)"
              eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi
          echo BREW_PATH="$brew_path" >> $GITHUB_ENV
          echo BREW_PREFIX="$brew_prefix" >> $GITHUB_ENV
          brew install v2ray

      - name: Install v2ray (Windows via Scoop)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          $env:PATH = "$env:USERPROFILE\scoop\shims;$env:PATH"
          scoop bucket add extras
          scoop install v2ray
          # Persist shims path to subsequent steps
          "$env:USERPROFILE\scoop\shims" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Write v2ray config
        shell: bash
        run: |
          cat > v2ray-config.json << 'EOF'
          {
            "inbounds": [{
              "port": 1080,
              "listen": "127.0.0.1",
              "protocol": "socks",
              "settings": { "auth": "noauth", "udp": true }
            }],
            "outbounds": [{ "protocol": "freedom", "settings": {} }]
          }
          EOF

      - name: Download Wintun
        if: matrix.os == 'windows'
        shell: bash
        run: |
          curl -fsSL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          unzip -q wintun.zip -d wintun
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            cp wintun/wintun/bin/arm64/wintun.dll "target/${{ matrix.target }}/release/"
          else
            cp wintun/wintun/bin/amd64/wintun.dll "target/${{ matrix.target }}/release/"
          fi
 
      - name: Start v2ray (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          systemd-run --user --scope --quiet --wait --pipe \
            v2ray run -c v2ray-config.json > v2ray.log 2> v2ray-err.log

      - name: Start v2ray (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          v2ray run -c v2ray-config.json > v2ray.log 2> v2ray-err.log &

      - name: Start v2ray (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $v2ray_bin=$(Get-Command v2ray).Source
          Write-Host "v2ray binary: $v2ray_bin"
          $proc = Start-Process $v2ray_bin `
            -ArgumentList "run", "-c", "v2ray-config.json" `
            -NoNewWindow -RedirectStandardOutput v2ray.log -RedirectStandardError v2ray-err.log `
            -PassThru
          Start-Sleep -Seconds 2

      - name: Start tinytun (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          sudo nohup ./target/${{ matrix.target }}/release/tinytun run \
            --socks5 127.0.0.1:1080 \
            --auto-route \
            --dns-hijack-enabled=false \
            --exclude-process v2ray \
            --loglevel info \
            > tinytun.log 2>&1 &
          echo "tinytun PID: $!"
          sleep 8

      - name: Start tinytun (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $proc = Start-Process "target\${{ matrix.target }}\release\tinytun.exe" `
            -ArgumentList "run", "--socks5", "127.0.0.1:1080", "--auto-route",
                          "--dns-hijack-enabled=false", "--exclude-process", "v2ray",
                          "--loglevel", "info" `
            -NoNewWindow -RedirectStandardOutput tinytun.log -RedirectStandardError tinytun-err.log `
            -PassThru
          Write-Host "tinytun PID: $($proc.Id)"
          Start-Sleep -Seconds 10

      - name: Test connectivity via curl (204 check)
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            HTTP_CODE=$(curl -4 --max-time 15 -o /dev/null -s -w "%{http_code}" \
              http://www.google.com/generate_204 || echo "000")
            echo "HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Test passed!"
              exit 0
            fi
            sleep 5
          done
          echo "All attempts failed."
          exit 1

      - name: Dump logs
        if: failure()
        shell: bash
        run: |
          echo "=== tinytun.log ==="
          cat tinytun.log || echo "(not found)"
          echo "=== tinytun-err.log ==="
          cat tinytun-err.log || echo "(not found)"
          echo "=== v2ray.log ==="
          cat v2ray.log || echo "(not found)"
          echo "=== v2ray-err.log ==="
          cat v2ray-err.log || echo "(not found)"
